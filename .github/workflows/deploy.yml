name: deploy

on:
  # Deployment is triggered whenever a push is made to the main branch.
  push:
    branches: [main]
  # Manually trigger deployment
  workflow_dispatch:

jobs:
  docs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          # "Last updated time" and other git log-related information require full history.
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm ci

      - name: Build VuePress site
        run: npm run docs:build

      - name: Deploy to GitHub Pages (jin999-legacy)
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: gh-pages
          build_dir: docs/.vuepress/dist
          # Keep custom domain mapping after every deploy.
          fqdn: jin999.net
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}